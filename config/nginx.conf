upstream permyt_mcp {
  server localhost:9020;
}


map $http_upgrade $connection_upgrade {
  default   upgrade;
  ''        close;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name mcp.permyt.io;

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

  access_log /var/deployments/mcp/logs/nginx.access.log;
  error_log /var/deployments/mcp/logs/nginx.error.log;

  client_max_body_size 10M;

  # Django managed static files (generated via collectstatic)
  location /static {
    alias   /var/deployments/mcp/static;
    autoindex off;

    expires 30d;
    add_header Pragma public;
    add_header Cache-Control "public, must-revalidate, proxy-revalidate";

    gzip_static on;
  }

  # MCP Streamable HTTP endpoint — needs long-lived connections
  # Match both /mcp and /mcp/* (= exact, then prefix with /)
  location /mcp {
    proxy_pass http://permyt_mcp;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Streamable HTTP requires no buffering and long timeouts
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    chunked_transfer_encoding on;
  }

  # OAuth well-known metadata (RFC 8414 + RFC 9728)
  location /.well-known/oauth-authorization-server {
    proxy_pass http://permyt_mcp;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /.well-known/oauth-protected-resource {
    proxy_pass http://permyt_mcp;
    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Django REST API + web pages
  location / {
    proxy_pass http://permyt_mcp;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
