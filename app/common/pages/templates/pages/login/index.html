<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #20252b;
      --light: #eedee7;
      --primary: #d04b16;
      --glass-bg: rgba(255, 240, 230, 0.04);
      --glass-border: rgba(255, 200, 160, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 40px rgba(0,0,0,0.2);
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 32px; font-size: 0.95rem; }
    #qr-container { display: inline-block; padding: 16px; background: #fff; border-radius: 12px; }
    #qr-container img { display: block; }
    #status { margin-top: 24px; font-size: 0.9rem; color: rgba(255,255,255,0.4); }
    #status.authenticated { color: #a9d389; }
    #status.error { color: #ef4444; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>PERMYT</h1>
    <p class="subtitle">Scan the QR code with your PERMYT app to connect.</p>

    {{ qr_data|json_script:"qr-data" }}
    <div id="qr-container" data-login-id="{{ login_id }}"></div>
    <p id="status"><span class="spinner"></span> Waiting for scan&hellip;</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var container = document.getElementById("qr-container");
      var QR_DATA = document.getElementById("qr-data").textContent;
      var LOGIN_ID = container.dataset.loginId;

      new QRCode(container, {
        text: QR_DATA,
        width: 256,
        height: 256,
        colorDark: "#20252b",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.L,
      });

      var polling = setInterval(function () {
        fetch("/rest/login/status/?id=" + encodeURIComponent(LOGIN_ID))
          .then(function (res) {
            return res.json().then(function (data) {
              return { status: res.status, data: data };
            });
          })
          .then(function (result) {
            if (result.data.status === "authenticated") {
              clearInterval(polling);
              var el = document.getElementById("status");
              el.className = "authenticated";
              el.textContent = "Connected! Redirecting\u2026";
              setTimeout(function () { window.location.href = "/"; }, 500);
            } else if (result.status >= 400) {
              clearInterval(polling);
              var el = document.getElementById("status");
              el.className = "error";
              el.textContent = result.data.error || "Login failed.";
            }
          })
          .catch(function () {});
      }, 2000);
    });
  </script>
</body>
</html>
